<html>
    <head>
        <title>Signup list</title>
		<link rel="stylesheet" type="text/css" href="/static/css/bootstrap.css">
    </head>

    <body>
        <ul>
            {% for signup in signups %}
                <li>{{ signup.email }}</li>
            {% else %}
                <li>No signups yet.</li>
            {% endfor %}
        </ul>
    </body>
</html>
